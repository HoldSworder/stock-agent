services:
  stock-agent:
    # 群晖部署：docker compose pull 直接拉 GHCR 镜像（由 GitHub Actions 构建）。
    # 本地需自行构建时：docker compose up -d --build（会用下方 build 段重建同名镜像）。
    image: ghcr.io/holdsworder/stock-agent:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: stock-agent
    restart: unless-stopped
    ports:
      - "8787:8787"
    env_file:
      - .env
    environment:
      # 容器内数据库路径，对应下方挂载卷
      DATABASE_PATH: /app/data/stock-agent.sqlite
    volumes:
      # 宿主数据目录：群晖部署时在 .env 设 DATA_DIR=/volume1/docker/stock-agent/data
      # （Synology 共享文件夹绝对路径）；本地默认仓库内 ./data。
      # 必须落在 NAS 本地磁盘（btrfs/ext4），切勿用网络挂载，否则 SQLite WAL 会损坏。
      - ${DATA_DIR:-./data}:/app/data

  # 注：AKShare HTTP 服务（aktools）与 a-stock-data sidecar 均作为独立基础设施容器部署
  # （与 trendradar/scrapling 一致），不并入本 compose；后端在「数据源」页填各自暴露地址即可。
  # a-stock-data 独立部署见 sidecar/a-stock-data/DEPLOY.md（mootdx 需国内 IP，部署在 NAS）。
  # a-stock-data 稳定后可逐步替代 aktools（见 docs/aktools-to-astockdata-migration.md）。
